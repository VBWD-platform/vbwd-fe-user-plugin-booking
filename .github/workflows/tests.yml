name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — booking (fe-user)
    runs-on: ubuntu-latest

    steps:
      - name: Clone vbwd-fe-user
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-user
          ref: main
          path: vbwd-fe-user
          submodules: recursive

      - name: Clone plugin (under test)
        uses: actions/checkout@v4
        with:
          path: vbwd-fe-user/plugins/booking

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build fe-core submodule
        working-directory: vbwd-fe-user/vbwd-fe-core
        run: npm install && npm run build

      - name: Install dependencies
        working-directory: vbwd-fe-user
        run: rm -f package-lock.json && npm install

      - name: Install ALL plugins (vue-tsc needs full project)
        working-directory: vbwd-fe-user/plugins
        run: |
          for entry in "chat:vbwd-fe-user-plugin-chat" "checkout:vbwd-fe-user-plugin-checkout" "cms:vbwd-fe-user-plugin-cms" "ghrm:vbwd-fe-user-plugin-ghrm" "landing1:vbwd-fe-user-plugin-landing1" "paypal-payment:vbwd-fe-user-plugin-paypal-payment" "stripe-payment:vbwd-fe-user-plugin-stripe-payment" "taro:vbwd-fe-user-plugin-taro" "theme-switcher:vbwd-fe-user-plugin-theme-switcher" "yookassa-payment:vbwd-fe-user-plugin-yookassa-payment"; do
            name="${entry%%:*}"; repo="${entry##*:}"
            [ -d "$name" ] && continue
            git clone --depth=1 -q "https://github.com/VBWD-platform/${repo}.git" "$name" 2>/dev/null || echo "Skipping $name"
          done

      - name: Run pre-commit (style + unit) for booking plugin
        working-directory: vbwd-fe-user
        run: ./bin/pre-commit-check.sh --plugin booking --unit
